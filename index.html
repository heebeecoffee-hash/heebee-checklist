<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1d1d1f">
  <title>Heebee Shift System v3</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200;300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════════════════════════════════
       HEEBEE LUXURY UI SYSTEM — Core tokens + glass morphism
       ══════════════════════════════════════════════════════════════════════════ */
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Typography */
      --font-hero: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Space Mono', 'SF Mono', Monaco, monospace;
      
      /* Light theme */
      --bg-light: #f5f5f7;
      --fg-light: #1d1d1f;
      --border-light: rgba(0, 0, 0, 0.10);
      --glass-light: rgba(255, 255, 255, 0.75);
      --glass-border-light: rgba(255, 255, 255, 0.9);
      
      /* Dark theme */
      --bg-dark: #0a0a0f;
      --fg-dark: #f5f5f7;
      --border-dark: rgba(255, 255, 255, 0.10);
      --glass-dark: rgba(255, 255, 255, 0.12);
      --glass-border-dark: rgba(255, 255, 255, 0.18);
      
      /* Gradients */
      --warm-gradient: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
      --cool-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      
      /* Base font size */
      font-size: 115%;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: var(--font-hero);
      font-weight: 300;
      background: var(--bg-light);
      color: var(--fg-light);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      position: relative;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Ambient background orbs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 600px;
      height: 600px;
      background: var(--warm-gradient);
      top: -300px;
      right: -200px;
    }

    body::after {
      width: 500px;
      height: 500px;
      background: var(--cool-gradient);
      bottom: -250px;
      left: -150px;
    }

    /* Noise texture overlay */
    body::after {
      background-image: 
        url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.05"/%3E%3C/svg%3E'),
        var(--cool-gradient);
    }

    /* Glass surfaces */
    .glass {
      background: var(--glass-light);
      border: 1px solid var(--glass-border-light);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }

    /* Buttons */
    button {
      font-family: var(--font-hero);
      cursor: pointer;
      border: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:active {
      transform: scale(0.98);
    }

    /* Inputs */
    input {
      font-family: var(--font-hero);
      border: none;
      outline: none;
      transition: all 0.2s ease;
    }

    /* Hide scrollbars but keep functionality */
    ::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       APP CONTAINER
       ══════════════════════════════════════════════════════════════════════════ */
    
    #app {
      position: relative;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 20px;
      z-index: 1;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       SCREENS (Login, FM Dashboard, Barista View)
       ══════════════════════════════════════════════════════════════════════════ */
    
    .screen {
      display: none;
    }

    .screen.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════════════════════════════════════════
       LOGIN SCREEN
       ══════════════════════════════════════════════════════════════════════════ */
    
    .login-hero {
      text-align: center;
      padding: 60px 0 40px;
    }

    .login-hero h1 {
      font-size: 1.8rem;
      font-weight: 200;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 8px;
      background: var(--warm-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-hero p {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #86868b;
    }

    .login-card {
      background: var(--glass-light);
      border: 1px solid var(--glass-border-light);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 24px;
      padding: 32px 28px;
      margin-bottom: 16px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #86868b;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 0.9rem;
      font-weight: 400;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      color: var(--fg-light);
    }

    .input-group input:focus {
      background: rgba(255, 255, 255, 0.8);
      border-color: #1d1d1f;
    }

    .pin-input {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .pin-input input {
      width: 52px;
      height: 52px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 1.4rem;
      font-weight: 700;
      padding: 0;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: #1d1d1f;
      color: #fff;
      border-radius: 16px;
      margin-top: 24px;
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .error-msg {
      padding: 12px 16px;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.2);
      border-radius: 12px;
      color: #dc2626;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 16px;
      display: none;
    }

    .error-msg.show {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* ══════════════════════════════════════════════════════════════════════════
       DASHBOARD HEADER
       ══════════════════════════════════════════════════════════════════════════ */
    
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 24px;
    }

    .dash-user {
      flex: 1;
    }

    .dash-user-name {
      font-size: 1.3rem;
      font-weight: 200;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .dash-user-meta {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #86868b;
    }

    .dash-logout {
      padding: 10px 20px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(220, 38, 38, 0.1);
      color: #dc2626;
      border: 1px solid rgba(220, 38, 38, 0.2);
      border-radius: 12px;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       FM DASHBOARD TABS
       ══════════════════════════════════════════════════════════════════════════ */
    
    .fm-tabs {
      display: flex;
      gap: 8px;
      background: var(--glass-light);
      border: 1px solid var(--glass-border-light);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 20px;
      padding: 6px;
      margin-bottom: 20px;
    }

    .fm-tab {
      flex: 1;
      padding: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: transparent;
      color: #86868b;
      border-radius: 14px;
    }

    .fm-tab.active {
      background: #1d1d1f;
      color: #fff;
    }

    .fm-panel {
      display: none;
    }

    .fm-panel.active {
      display: block;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       STAFF LIST (FM Dashboard → Staff tab)
       ══════════════════════════════════════════════════════════════════════════ */
    
    .staff-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .staff-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: var(--glass-light);
      border: 1px solid var(--glass-border-light);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 16px;
    }

    .staff-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #86868b;
      flex-shrink: 0;
    }

    .staff-status.online {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
    }

    .staff-info {
      flex: 1;
    }

    .staff-name {
      font-size: 0.9rem;
      font-weight: 400;
      margin-bottom: 2px;
    }

    .staff-meta {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #86868b;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       ROSTER PANEL (FM Dashboard → Roster tab) — BUG 3 FIX APPLIED
       ══════════════════════════════════════════════════════════════════════════ */
    
    .roster-hint {
      padding: 14px 16px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 12px;
      color: #6366f1;
      font-size: 0.7rem;
      text-align: center;
      margin-bottom: 16px;
    }

    .roster-slots {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .roster-slot {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--glass-light);
      border: 1px solid var(--glass-border-light);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 14px;
    }

    .roster-role {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #86868b;
      min-width: 80px;
    }

    .roster-select {
      flex: 1;
      padding: 10px 12px;
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      color: var(--fg-light);
      cursor: pointer;
    }

    .roster-select:focus {
      background: rgba(255, 255, 255, 0.8);
      border-color: #1d1d1f;
    }

    .roster-status {
      padding: 12px 16px;
      background: var(--glass-light);
      border: 1px solid var(--glass-border-light);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 12px;
      text-align: center;
      margin-bottom: 16px;
    }

    .roster-status-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #86868b;
      margin-bottom: 4px;
    }

    .roster-status-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--fg-light);
    }

    .btn-save-roster {
      width: 100%;
      padding: 14px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: #1d1d1f;
      color: #fff;
      border-radius: 14px;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       BARISTA VIEW — Task cards with timer buttons
       ══════════════════════════════════════════════════════════════════════════ */
    
    .barista-header {
      padding: 16px 0 20px;
    }

    .barista-shift {
      font-size: 1.5rem;
      font-weight: 200;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .barista-meta {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #86868b;
    }

    .priority-filter {
      display: flex;
      gap: 8px;
      background: var(--glass-light);
      border: 1px solid var(--glass-border-light);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 16px;
      padding: 5px;
      margin-bottom: 20px;
    }

    .filter-btn {
      flex: 1;
      padding: 10px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: transparent;
      color: #86868b;
      border-radius: 11px;
    }

    .filter-btn.active {
      background: #1d1d1f;
      color: #fff;
    }

    .task-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-card {
      padding: 18px 20px;
      background: var(--glass-light);
      border: 1px solid var(--glass-border-light);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 18px;
    }

    .task-card.started {
      border-color: rgba(34, 197, 94, 0.3);
      background: rgba(34, 197, 94, 0.05);
    }

    .task-card.done {
      opacity: 0.5;
      border-color: rgba(0, 0, 0, 0.1);
    }

    .task-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .task-who {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      background: rgba(99, 102, 241, 0.1);
      color: #6366f1;
      border-radius: 8px;
    }

    .task-priority {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 8px;
    }

    .task-priority.high {
      background: rgba(251, 191, 36, 0.1);
      color: #f59e0b;
    }

    .task-priority.critical {
      background: rgba(220, 38, 38, 0.1);
      color: #dc2626;
    }

    .task-name {
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .task-tip {
      font-size: 0.7rem;
      color: #86868b;
      font-style: italic;
      line-height: 1.4;
      margin-bottom: 14px;
    }

    .task-actions {
      display: flex;
      gap: 8px;
    }

    .btn-task {
      flex: 1;
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 12px;
    }

    .btn-start {
      background: rgba(34, 197, 94, 0.15);
      color: #16a34a;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .btn-done {
      background: rgba(99, 102, 241, 0.15);
      color: #6366f1;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    .task-timer {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: #86868b;
      text-align: center;
      padding: 8px;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       UTILITY CLASSES
       ══════════════════════════════════════════════════════════════════════════ */
    
    .hidden {
      display: none !important;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #86868b;
      font-size: 0.8rem;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #86868b;
      font-size: 0.85rem;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- ══════════════════════════════════════════════════════════════════════
         LOGIN SCREEN
         ══════════════════════════════════════════════════════════════════════ -->
    <div id="screenLogin" class="screen active">
      <div class="login-hero">
        <h1>Heebee</h1>
        <p>Shift System v3</p>
      </div>
      
      <div class="login-card">
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
        </div>
        
        <div class="input-group">
          <label>4-Digit PIN</label>
          <div class="pin-input">
            <input type="tel" maxlength="1" class="pin-digit" data-index="0" inputmode="numeric" pattern="[0-9]*">
            <input type="tel" maxlength="1" class="pin-digit" data-index="1" inputmode="numeric" pattern="[0-9]*">
            <input type="tel" maxlength="1" class="pin-digit" data-index="2" inputmode="numeric" pattern="[0-9]*">
            <input type="tel" maxlength="1" class="pin-digit" data-index="3" inputmode="numeric" pattern="[0-9]*">
          </div>
        </div>
        
        <button class="btn-primary" id="btnLogin" disabled>Sign In</button>
      </div>
      
      <div class="error-msg" id="loginError"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════════════════════
         FM DASHBOARD
         ══════════════════════════════════════════════════════════════════════ -->
    <div id="screenFM" class="screen">
      <div class="dash-header">
        <div class="dash-user">
          <div class="dash-user-name" id="fmName">—</div>
          <div class="dash-user-meta"><span id="fmShift">—</span> · Floor Manager</div>
        </div>
        <button class="dash-logout" id="btnLogoutFM">Logout</button>
      </div>

      <div class="fm-tabs">
        <button class="fm-tab active" data-tab="staff">Staff</button>
        <button class="fm-tab" data-tab="roster">Roster</button>
        <button class="fm-tab" data-tab="notes">Notes</button>
      </div>

      <!-- Staff tab -->
      <div id="panelStaff" class="fm-panel active">
        <div id="staffList" class="staff-list">
          <div class="loading">Loading staff...</div>
        </div>
      </div>

      <!-- Roster tab — BUG 3 FIX: Only shows Barista 1/2/3, FM auto-injected on save -->
      <div id="panelRoster" class="fm-panel">
        <div class="roster-hint">Assign baristas · you're FM for this shift</div>
        
        <div class="roster-slots">
          <div class="roster-slot">
            <div class="roster-role">Barista 1</div>
            <select class="roster-select" data-role="Barista 1">
              <option value="">— Not assigned —</option>
            </select>
          </div>
          <div class="roster-slot">
            <div class="roster-role">Barista 2</div>
            <select class="roster-select" data-role="Barista 2">
              <option value="">— Not assigned —</option>
            </select>
          </div>
          <div class="roster-slot">
            <div class="roster-role">Barista 3</div>
            <select class="roster-select" data-role="Barista 3">
              <option value="">— Not assigned —</option>
            </select>
          </div>
        </div>

        <div class="roster-status">
          <div class="roster-status-label">Status</div>
          <div class="roster-status-value" id="rosterStatusText">NOT SET</div>
        </div>

        <button class="btn-save-roster" id="btnSaveRoster">Save Roster</button>
      </div>

      <!-- Notes tab (placeholder) -->
      <div id="panelNotes" class="fm-panel">
        <div class="empty-state">
          <div class="empty-state-icon">📝</div>
          <div>Handover notes coming soon</div>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════════════════
         BARISTA VIEW
         ══════════════════════════════════════════════════════════════════════ -->
    <div id="screenBarista" class="screen">
      <div class="dash-header">
        <div class="dash-user">
          <div class="dash-user-name" id="baristaName">—</div>
          <div class="dash-user-meta"><span id="baristaRole">—</span> · <span id="baristaShift">—</span></div>
        </div>
        <button class="dash-logout" id="btnLogoutBarista">Logout</button>
      </div>

      <div class="priority-filter">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="critical">Critical</button>
        <button class="filter-btn" data-filter="high">High</button>
      </div>

      <div id="taskCards" class="task-cards">
        <div class="loading">Loading tasks...</div>
      </div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════════════════════════
    //  CONFIG — Replace with your Apps Script web app URL
    // ══════════════════════════════════════════════════════════════════════════
    
    const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE'; // ← PASTE YOUR DEPLOYED WEB APP URL HERE

    // ══════════════════════════════════════════════════════════════════════════
    //  STATE
    // ══════════════════════════════════════════════════════════════════════════
    
    let session = null;
    let allStaff = [];
    let rosterState = {};
    let taskTimers = {}; // { taskName: { startTime: Date, intervalId: setInterval } }

    // ══════════════════════════════════════════════════════════════════════════
    //  INIT
    // ══════════════════════════════════════════════════════════════════════════
    
    document.addEventListener('DOMContentLoaded', () => {
      checkSession();
      initLoginHandlers();
      initFMHandlers();
      initBaristaHandlers();
    });

    // ══════════════════════════════════════════════════════════════════════════
    //  SESSION MANAGEMENT
    // ══════════════════════════════════════════════════════════════════════════
    
    function checkSession() {
      const stored = localStorage.getItem('hb_v3_session');
      if (!stored) return;
      
      try {
        const s = JSON.parse(stored);
        const age = Date.now() - s.loginTime;
        if (age > 2 * 60 * 60 * 1000) { // 2 hours
          logout();
          return;
        }
        session = s;
        showScreen(s.role === 'Floor Manager' ? 'screenFM' : 'screenBarista');
        startPingInterval();
      } catch (e) {
        logout();
      }
    }

    function saveSession(data) {
      session = {
        ...data,
        loginTime: Date.now()
      };
      localStorage.setItem('hb_v3_session', JSON.stringify(session));
    }

    function logout() {
      if (session) {
        api('logout', { email: session.email });
      }
      session = null;
      localStorage.removeItem('hb_v3_session');
      showScreen('screenLogin');
      clearAllTimers();
    }

    function startPingInterval() {
      setInterval(() => {
        if (session) {
          api('ping', { email: session.email });
        }
      }, 30000); // 30s
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  API HELPER
    // ══════════════════════════════════════════════════════════════════════════
    
    async function api(action, data = {}) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...data })
      });
      return await res.json();
    }

    async function apiGet(action, params = {}) {
      const url = new URL(API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      const res = await fetch(url);
      return await res.json();
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  LOGIN HANDLERS
    // ══════════════════════════════════════════════════════════════════════════
    
    function initLoginHandlers() {
      const emailInput = document.getElementById('loginEmail');
      const pinInputs = document.querySelectorAll('.pin-digit');
      const btnLogin = document.getElementById('btnLogin');
      const errorMsg = document.getElementById('loginError');

      // Auto-advance PIN digits
      pinInputs.forEach((input, idx) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value;
          if (val.length === 1 && idx < 3) {
            pinInputs[idx + 1].focus();
          }
          checkLoginReady();
        });
        
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && idx > 0) {
            pinInputs[idx - 1].focus();
          }
        });
      });

      emailInput.addEventListener('input', checkLoginReady);

      function checkLoginReady() {
        const email = emailInput.value.trim();
        const pin = Array.from(pinInputs).map(i => i.value).join('');
        btnLogin.disabled = !email || pin.length !== 4;
      }

      btnLogin.addEventListener('click', async () => {
        const email = emailInput.value.trim();
        const pin = Array.from(pinInputs).map(i => i.value).join('');
        
        btnLogin.disabled = true;
        btnLogin.textContent = 'Signing in...';
        errorMsg.classList.remove('show');

        const res = await api('login', { email, pin });
        
        if (res.success) {
          saveSession(res);
          showScreen(res.role === 'Floor Manager' ? 'screenFM' : 'screenBarista');
          startPingInterval();
          
          // Reset form
          emailInput.value = '';
          pinInputs.forEach(i => i.value = '');
          btnLogin.textContent = 'Sign In';
        } else {
          errorMsg.textContent = res.error || 'Login failed';
          errorMsg.classList.add('show');
          btnLogin.disabled = false;
          btnLogin.textContent = 'Sign In';
        }
      });

      // Enter key submits
      emailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !btnLogin.disabled) btnLogin.click();
      });
      pinInputs[3].addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !btnLogin.disabled) btnLogin.click();
      });
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  FM DASHBOARD HANDLERS
    // ══════════════════════════════════════════════════════════════════════════
    
    function initFMHandlers() {
      document.getElementById('btnLogoutFM').addEventListener('click', logout);

      // Tab switching
      document.querySelectorAll('.fm-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const target = tab.dataset.tab;
          document.querySelectorAll('.fm-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.fm-panel').forEach(p => p.classList.remove('active'));
          document.getElementById('panel' + target.charAt(0).toUpperCase() + target.slice(1)).classList.add('active');
        });
      });

      // Roster save
      document.getElementById('btnSaveRoster').addEventListener('click', saveRoster);
    }

    async function loadFMDashboard() {
      document.getElementById('fmName').textContent = session.name;
      document.getElementById('fmShift').textContent = getShift();
      
      await loadStaffList();
      await loadRosterPanel();
    }

    // BUG 2 FIX: Staff list sorted (online first, alphabetical within each group)
    async function loadStaffList() {
      const staffData = await apiGet('getOnlineStaff');
      allStaff = staffData.staff || [];

      // Sort: online first (0), offline second (1), alphabetical within each group
      const sorted = allStaff.slice().sort((a, b) => {
        const ao = a.status === 'online' ? 0 : 1;
        const bo = b.status === 'online' ? 0 : 1;
        if (ao !== bo) return ao - bo;
        return a.name.localeCompare(b.name);
      });

      const container = document.getElementById('staffList');
      if (!sorted.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><div>No staff found</div></div>';
        return;
      }

      container.innerHTML = sorted.map(s => `
        <div class="staff-card">
          <div class="staff-status ${s.status === 'online' ? 'online' : ''}"></div>
          <div class="staff-info">
            <div class="staff-name">${s.name}</div>
            <div class="staff-meta">${s.role} · ${s.branch}</div>
          </div>
        </div>
      `).join('');
    }

    // BUG 3 FIX: Roster only shows Barista 1/2/3 slots, FM auto-injected on save
    async function loadRosterPanel() {
      // Populate dropdowns with barista-eligible staff (exclude FM)
      const baristas = allStaff.filter(s => s.role !== 'Floor Manager');
      const options = baristas.map(s => `<option value="${s.email}">${s.name}</option>`).join('');
      
      document.querySelectorAll('.roster-select').forEach(select => {
        const current = select.value;
        select.innerHTML = '<option value="">— Not assigned —</option>' + options;
        select.value = current; // restore selection
      });

      // Load existing roster for this shift
      const today = new Date().toISOString().split('T')[0];
      const shift = getShift();
      const data = await apiGet('getRosterAll', { date: today, shift });
      const roster = data.roster || [];

      // Populate state + UI from saved roster (baristas only)
      rosterState = {};
      roster.forEach(r => {
        if (r.role !== 'Floor Manager') {
          rosterState[r.role] = { email: r.email, name: r.name };
          const select = document.querySelector(`.roster-select[data-role="${r.role}"]`);
          if (select) select.value = r.email;
        }
      });

      updateRosterStatus();
    }

    function updateRosterStatus() {
      const ROSTER_ROLES = ['Barista 1', 'Barista 2', 'Barista 3']; // Only baristas
      const assigned = ROSTER_ROLES.filter(r => rosterState[r]).length;
      const total = ROSTER_ROLES.length;
      const statusText = assigned === total ? `SET · ${total} ASSIGNED` : `${assigned} / ${total} ASSIGNED`;
      document.getElementById('rosterStatusText').textContent = statusText;
    }

    async function saveRoster() {
      const ROSTER_ROLES = ['Barista 1', 'Barista 2', 'Barista 3']; // Only baristas
      
      // Collect barista assignments from dropdowns
      rosterState = {};
      document.querySelectorAll('.roster-select').forEach(select => {
        const role = select.dataset.role;
        const email = select.value;
        if (email) {
          const staff = allStaff.find(s => s.email === email);
          if (staff) {
            rosterState[role] = { email: staff.email, name: staff.name };
          }
        }
      });

      // Build assignments array: baristas from dropdowns + auto-inject FM
      const assignments = ROSTER_ROLES
        .filter(r => rosterState[r])
        .map(r => ({ role: r, email: rosterState[r].email, name: rosterState[r].name }));
      
      // Auto-inject FM — current user is always the FM for this shift
      assignments.push({ role: 'Floor Manager', email: session.email, name: session.name });

      const today = new Date().toISOString().split('T')[0];
      const shift = getShift();

      const res = await api('setRoster', { date: today, shift, assignments });
      
      if (res.success) {
        updateRosterStatus();
        alert('Roster saved ✓');
      } else {
        alert('Failed to save roster: ' + (res.error || 'Unknown error'));
      }
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  BARISTA VIEW HANDLERS
    // ══════════════════════════════════════════════════════════════════════════
    
    function initBaristaHandlers() {
      document.getElementById('btnLogoutBarista').addEventListener('click', logout);

      // Priority filter
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filterTasks(btn.dataset.filter);
        });
      });
    }

    async function loadBaristaView() {
      document.getElementById('baristaName').textContent = session.name;
      document.getElementById('baristaShift').textContent = getShift();
      
      // Get role from roster
      const today = new Date().toISOString().split('T')[0];
      const shift = getShift();
      const roleData = await apiGet('getRoster', { email: session.email, date: today, shift });
      const role = roleData.role || 'Barista';
      document.getElementById('baristaRole').textContent = role;

      await loadTasks();
    }

    async function loadTasks() {
      // Get tasks from task sheets
      const tasksData = await apiGet('getTasks');
      const shift = getShift();
      const tasks = shift === 'Morning' ? tasksData.openingTasks : tasksData.closingTasks;

      // Get shift logs to determine which tasks are started/done
      const today = new Date().toISOString().split('T')[0];
      const logsData = await apiGet('getShiftLogs', { date: today, shift });
      const logs = logsData.logs || [];

      const container = document.getElementById('taskCards');
      if (!tasks || !tasks.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✓</div><div>No tasks assigned</div></div>';
        return;
      }

      container.innerHTML = tasks.map(t => {
        const log = logs.find(l => l.staffName === session.name && l.taskName === t.task);
        const isStarted = log && log.startTime && !log.completeTime;
        const isDone = log && log.completeTime;
        
        const priorityClass = t.priority.includes('CRITICAL') ? 'critical' : t.priority.includes('HIGH') ? 'high' : '';
        const priorityLabel = t.priority.replace('🔴 ', '').replace('🟡 ', '').replace('🟢 ', '');

        return `
          <div class="task-card ${isStarted ? 'started' : ''} ${isDone ? 'done' : ''}" data-task="${t.task}" data-priority="${priorityClass}">
            <div class="task-card-header">
              <div class="task-who">${t.who}</div>
              ${priorityClass ? `<div class="task-priority ${priorityClass}">${priorityLabel}</div>` : ''}
            </div>
            <div class="task-name">${t.task}</div>
            ${t.tip ? `<div class="task-tip">${t.tip}</div>` : ''}
            <div class="task-actions">
              ${!isStarted && !isDone ? `<button class="btn-task btn-start" onclick="startTask('${t.task.replace(/'/g, "\\'")}')">Start</button>` : ''}
              ${isStarted ? `<div class="task-timer" data-task="${t.task}">—</div>` : ''}
              ${isStarted ? `<button class="btn-task btn-done" onclick="completeTask('${t.task.replace(/'/g, "\\'")}')">Done</button>` : ''}
              ${isDone ? `<div class="task-timer">${log.duration} min</div>` : ''}
            </div>
          </div>
        `;
      }).join('');

      // Start timers for started tasks
      tasks.forEach(t => {
        const log = logs.find(l => l.staffName === session.name && l.taskName === t.task);
        if (log && log.startTime && !log.completeTime) {
          startTaskTimer(t.task, log.startTime);
        }
      });
    }

    function filterTasks(filter) {
      const cards = document.querySelectorAll('.task-card');
      cards.forEach(card => {
        if (filter === 'all') {
          card.style.display = '';
        } else {
          card.style.display = card.dataset.priority === filter ? '' : 'none';
        }
      });
    }

    async function startTask(taskName) {
      const today = new Date().toISOString().split('T')[0];
      const shift = getShift();
      const now = new Date();
      const startTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

      const res = await api('logTaskStart', {
        date: today,
        shift,
        branch: session.branch,
        staffName: session.name,
        taskName,
        startTime
      });

      if (res.success) {
        loadTasks(); // Refresh to show timer
      } else {
        alert('Failed to start task: ' + (res.error || 'Unknown error'));
      }
    }

    async function completeTask(taskName) {
      const today = new Date().toISOString().split('T')[0];
      const now = new Date();
      const completeTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

      const res = await api('logTaskComplete', {
        date: today,
        branch: session.branch,
        staffName: session.name,
        taskName,
        completeTime
      });

      if (res.success) {
        stopTaskTimer(taskName);
        loadTasks(); // Refresh to show done state
      } else {
        alert('Failed to complete task: ' + (res.error || 'Unknown error'));
      }
    }

    function startTaskTimer(taskName, startTimeStr) {
      // Parse "HH:mm" from today
      const [h, m] = startTimeStr.split(':').map(Number);
      const startTime = new Date();
      startTime.setHours(h, m, 0, 0);

      const updateTimer = () => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        const display = `${mins}:${String(secs).padStart(2, '0')}`;
        
        const timerEl = document.querySelector(`.task-timer[data-task="${taskName}"]`);
        if (timerEl) timerEl.textContent = display;
      };

      updateTimer();
      const intervalId = setInterval(updateTimer, 1000);
      taskTimers[taskName] = { startTime, intervalId };
    }

    function stopTaskTimer(taskName) {
      if (taskTimers[taskName]) {
        clearInterval(taskTimers[taskName].intervalId);
        delete taskTimers[taskName];
      }
    }

    function clearAllTimers() {
      Object.keys(taskTimers).forEach(stopTaskTimer);
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  UTILITIES
    // ══════════════════════════════════════════════════════════════════════════
    
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
      
      if (screenId === 'screenFM') loadFMDashboard();
      if (screenId === 'screenBarista') loadBaristaView();
    }

    function getShift() {
      const h = new Date().getHours();
      return h >= 8 && h < 15 ? 'Morning' : 'Evening';
    }
  </script>
</body>
</html>
